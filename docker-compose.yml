services:
  postgres:
    image: postgres:16-alpine
    container_name: jmeter-patrimonio-db
    environment:
      POSTGRES_DB: patrimonio_jmeter
      POSTGRES_USER: jmeter
      POSTGRES_PASSWORD: jmeter_pass
    ports:
      - "5433:5432"
    volumes:
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/db/insert-sbn-catalog.sql:/docker-entrypoint-initdb.d/02-insert-sbn-catalog.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jmeter -d patrimonio_jmeter"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  patrimonio-service:
    build: .
    container_name: patrimonio-service
    ports:
      - "5003:5003"
    environment:
      SPRING_R2DBC_URL: "r2dbc:postgresql://postgres:5432/patrimonio_jmeter"
      SPRING_R2DBC_USERNAME: "jmeter"
      SPRING_R2DBC_PASSWORD: "jmeter_pass"
      SERVER_PORT: "5003"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
